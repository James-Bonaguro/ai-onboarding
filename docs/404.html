<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — Personalized AI Onboarding</title>
<meta name="color-scheme" content="light dark">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='8'%20fill='%231E3A5F'/%3E%3Cpath%20d='M16%207%2023%2022%209%2022Z'%20fill='none'%20stroke='%23CBA85C'%20stroke-width='2.2'%20stroke-linejoin='round'/%3E%3Ccircle%20cx='16'%20cy='17.6'%20r='2.1'%20fill='%23CBA85C'/%3E%3C/svg%3E">
<style>
  :root{color-scheme:light dark}
  body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:#FBFAF7;color:#1B1A17;padding:2rem}
  @media (prefers-color-scheme: dark){body{background:#141417;color:#ECEAE3}}
  h1{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-size:clamp(2rem,6vw,3rem);margin:0 0 .4rem}
  p{color:#6E6B63;max-width:42ch;margin:.4rem auto 1.6rem}
  @media (prefers-color-scheme: dark){p{color:#8C8980}}
  a.btn{display:inline-block;background:#1E3A5F;color:#fff;text-decoration:none;
    font-weight:600;padding:.8rem 1.4rem;border-radius:10px}
  .num{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-size:clamp(4rem,16vw,8rem);
    line-height:1;color:#1E3A5F;opacity:.5;margin-bottom:.5rem}
  @media (prefers-color-scheme: dark){.num{color:#8FB4D6}}
</style>
</head>
<body>
  <main>
    <div class="num">404</div>
    <h1>Nothing here</h1>
    <p>That page doesn’t exist — but everything you came for does. Head back to the start.</p>
    <a class="btn" id="home" href="/ai-onboarding/">Back to the start</a>
  </main>
  <script>
    // Point "home" at the site root regardless of where this 404 was served from.
    (function(){
      try{
        var seg = location.pathname.split('/').filter(Boolean)[0];
        document.getElementById('home').href = seg ? '/' + seg + '/' : '/';
      }catch(e){}
    })();
  </script>
</body>
</html>
